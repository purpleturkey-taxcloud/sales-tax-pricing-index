  - date: 2026-05-12
    change_type: structure_change
    description: "Captured full TaxCloud pricing ladders from internal pricing table. Subscription: 9-tier Starter ($199-$6,299/yr) and 9-tier Premium ($799-$12,999/yr) covering 100-40,000 monthly orders. Filings: 9-tier annual subscription ($399 at 12 filings/yr through $11,999 at 600 filings/yr) replacing the per-filing × volume model. Annual prepay discount corrected from ~10% to ~16% across all tiers. Per-filing rate ($39 base) retained as informational; calculator now uses tier_pricing when present."
    source: "https://taxcloud.com/taxcloud-pricing/"

calculator:
  applicable_inputs:
    - monthly_orders
    - states_filing
    - states_physical_nexus
    - filing_frequency
    - registration_backlog
    - integration_type
  cost_formula_notes: |
    1. Pick plan: Free (home state only), Starter (multi-state, no API), or Premium (API + SST benefits)
    2. Compute subscription: monthly_price * 12, apply 10% annual discount if applicable
    3. Compute SST-eligible filings (Premium only): states with no physical nexus that are SST members
    4. Filing cost = (total_filings - sst_free_filings) * $39 (volume discounts toward $20 at scale)
    5. Registrations modeled as $0 (TaxCloud absorbs SST state registrations; non-SST state fees passthrough)
    6. Total annual = subscription + filings + 0 (registrations)
  output_caveat: "Filings are priced as a tiered annual subscription (not per-filing × volume). SST CSP credit eliminates the per-filing cost in up to 24 SST member states where the customer has economic nexus only (no physical presence)."

notes: |
