    source: "https://checkthat.ai/brands/avalara/pricing"
    confidence: C
  
  state_upcharges: []             # Not publicly broken out; likely exists for CO/LA
  
  volume_discounts: []
  
  notes: "Per-filing pricing reported in $42-$54 range from aggregator buyer data. Backfiling reported at $1,500/return in some customer cases (TrustRadius review)."

