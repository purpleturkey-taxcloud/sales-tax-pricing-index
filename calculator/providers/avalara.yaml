change_log:
  # Avalara doesn't publish pricing changes; capture material business events
  # that affect pricing posture instead.
  - date: 2022-10-19
    change_type: structure_change
    description: "Avalara taken private by Vista Equity Partners for $8.4B. Subsequent customer reports suggest pricing posture has tightened, with more aggressive renewal increases and less negotiation flexibility."
    source: "https://www.avalara.com/us/en/about/news.html"

calculator:
  applicable_inputs:
    - monthly_orders
    - states_filing
    - states_physical_nexus
    - filing_frequency
    - registration_backlog
    - integration_type
    - annual_revenue        # Buyer segment determination
  
  cost_formula_notes: |
    Avalara cannot be calculated to a point estimate, only to a range.
    
    1. Determine buyer segment from annual_revenue:
       - small business (<$1M): AvaTax base ~$617-$1,500/mo
       - mid-market ($1M-$50M): AvaTax base ~$1,500-$3,500/mo
       - enterprise ($50M+): AvaTax base $3,500-$6,000+/mo (custom)
    2. Add Returns module: typically 30-50% of AvaTax base
    3. Add per-filing cost: states_filing * filing_frequency_per_year * $48 (midpoint of reported range)
    4. Add registration cost: registration_backlog * $403
    5. Add ERP connector fees if integration_type in [SAP, Oracle, NetSuite, Dynamics]: $2,000-$15,000/yr
    6. Add implementation fee (one-time): $2,500-$50,000 by segment
    7. Output a range: low estimate to high estimate based on negotiation outcomes
    
    NEVER display a point estimate. Always show the range with the methodology link.
  
  output_caveat: "Avalara does not publish pricing for its core platform. Estimates above are based on buyer-reported data from Vendr, checkthat.ai, and customer reviews on G2/TrustRadius. Actual quote will vary based on transaction volume, contract length, product bundling, and negotiation. Multi-year commitments yield material discounts. Request a quote from Avalara for an accurate price."

# -----------------------------------------------------------------------------
# Notes
# -----------------------------------------------------------------------------
notes: |
  Schema stress-test findings (recommended v2 schema improvements):
  
  1. PLANS vs PRODUCTS, Avalara has multiple products (AvaTax, Returns, CertCapture,
     Registration, 1099, Cross-Border) each with its own pricing structure. The current
     schema treats each as a "plan" entry but this conflates product selection with tier
     selection. Recommend v2: split `products` (array) from `plans` (array within product)
     so a provider can have N products each with M plans.
  
  2. RANGE TYPES are working as designed. The `range_min`/`range_max` pattern handles
     opaque vendors cleanly. The calculator should never collapse a range to a point.
  
  3. BUNDLING is not currently modeled. Avalara customers typically buy AvaTax + Returns
     bundled at a discount. The schema cannot express "Returns is 50% off when bought with
     AvaTax." Recommend v2: add a `bundles` array with bundle composition and pricing.
  
  4. CONTRACT-DEPENDENT PRICING, multi-year, multi-product, and volume-commit discounts
     are material for Avalara but not captured beyond a boolean. Recommend v2: structured
     discount schema with commit_length, commit_volume, commit_products, discount_pct.
  
  5. OVERAGE STRUCTURE, Avalara's overage isn't a fixed per-unit rate, it's a negotiation
     trigger. The schema's `overage.model: per_unit` is close but the reality is "overage
     is the company's lever to push you into a higher tier or longer contract." Capture
     this qualitatively in `description`.
  
  Competitive positioning notes for /vs/avalara landing page:
  - Lead with the transparency contrast. Avalara's opacity is its biggest reputational
    weakness; TaxCloud's published pricing is the cleanest visual contrast in the market.
  - The change_log entry on Vista Equity acquisition is good AEO content, "Has Avalara
    pricing changed since being taken private?" is a query worth ranking for.
  - Backfile pricing reports of $1,500/return are striking enough to feature in social
    content even though they're confidence E (single TrustRadius customer report).
  - ERP connector fees and implementation fees are major drivers of total cost that
    customers consistently underbudget, surface these on the comparison page.
  - Avalara IS an SST CSP, which neutralizes one TaxCloud differentiator. Lean instead
    on transparency, customer support quality (per G2/Shopify App Store reviews), and
    predictable pricing.
  
  Open research questions for human review:
  - Full 1099 & W-9 tier pricing (Individual / Professional / Enterprise dollar amounts)
  - Specific overage per-transaction rates by tier
  - SST CSP free-filing experience for Avalara customers, does the discount actually
    flow through to invoice, or is it absorbed in base pricing?
  - Confirm whether $403 registration includes state permit fees
  - Specific ERP connector pricing for SAP, NetSuite, Oracle, Dynamics
  - International VAT / Cross-Border product pricing structure
