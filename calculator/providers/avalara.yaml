# =============================================================================
# Avalara, populated example following schema.yaml v1.0
# Last full verification: 2026-05-11
# Researcher: TaxCloud GTM (initial draft)
#
# Why Avalara is the second example:
# - Opposite end of the transparency spectrum from TaxJar, stress-tests the
#   schema's opaque-vendor handling, range types, and confidence ratings.
# - Multi-product structure (AvaTax + Returns + CertCapture + Registration +
#   License Guidance + 1099) reveals where the schema bends. See notes at
#   bottom for schema v2 recommendations.
# - #1 displacement target for TaxCloud GTM, so accuracy and citation quality
#   matter more here than for any other competitor.
#
# DATA POSTURE
# Avalara publishes pricing for only a narrow set of low-touch products
# (License Guidance, Sales Tax Registration, 1099 & W-9). The core platform
# AvaTax, Returns, CertCapture, and ERP connectors, is quote-only. Every
# price below for core products is sourced from Vendr buyer data, checkthat.ai,
# G2 / TrustRadius / Capterra reports, and Reddit invoices. These are
# confidence C–E and MUST be displayed as ranges with disclosed methodology.
# =============================================================================

provider:
  name: "Avalara"
  slug: "avalara"
  legal_name: "Avalara, Inc."
  parent_company: "Vista Equity Partners"  # Taken private by Vista in 2022; reportedly planning IPO
  hq_location: "Durham, North Carolina, USA"
  founded_year: 2004
  primary_url: "https://www.avalara.com"
  pricing_url: "https://www.avalara.com/us/en/products/pricing.html"
  help_center_url: "https://help.avalara.com"
  target_icp: "Mid-market to enterprise; broad horizontal coverage across ecommerce, manufacturing, retail, SaaS"
  primary_verticals:
    - enterprise
    - ecommerce
    - b2b
    - saas
  competitive_position: "Market incumbent (founded 2004, ~30,000 customers). Broadest integration catalog. Quote-based, sales-led GTM. Frequently criticized in reviews for opaque pricing, costly overages, and slow support."

transparency:
  tier: opaque
  rationale: "Core platform (AvaTax, Returns, CertCapture) is quote-only with no published list pricing. Only narrow ancillary products (License Guidance, Sales Tax Registration, 1099 & W-9) have public per-unit pricing. Multiple third-party sources confirm pricing is custom and varies materially by customer."
  pricing_page_has_dollar_amounts: true   # Yes, but only for low-touch products, not core
  quote_required_for_core_product: true
  publishes_filing_fees: false
  publishes_registration_fees: true       # $403/state is published
  publishes_overage_rates: false
  publishes_implementation_fees: false

pricing_model:
  primary: custom_quote
  scales_with:
    - transactions
    - states
    - filings
    - jurisdictions
    - seats
  predictability_score: 1
  predictability_notes: "Pricing is custom-quoted per customer based on monthly transaction volume, jurisdiction count, product mix, integration complexity, and contract length. Vendr data shows the same nominal transaction tier can produce contract values varying by 2-3x across customers. Overage charges and ERP connector fees are common sources of unbudgeted cost. Multi-year and multi-product commitments yield material discounts but lock customers in."

# -----------------------------------------------------------------------------
# Plans
#
# SCHEMA NOTE: Avalara does not have "plans" in the TaxJar sense. It has
# multiple separately purchaseable products (AvaTax, Returns, CertCapture,
# Registration, License Guidance, 1099). For v1, we model each product as a
# "plan" entry. Buyer segments (small / mid-market / enterprise) are captured
# as order_tiers within AvaTax since that's where the contract value sits.
# For v2 of the schema, recommend splitting `products` from `plans` so a
# provider can have multiple products each with multiple plans.
# -----------------------------------------------------------------------------
plans:
  - name: "AvaTax (core tax calculation engine)"
    slug: "avatax"
    tagline: "Core sales tax calculation across 13,000+ U.S. jurisdictions; quote-based"
    target_customer: "Any business with multi-state nexus; pricing scales with monthly transaction volume"
    is_free: false
    is_quote_only: true
    
    monthly_price:
      amount: null
      type: range
      range_min: 617          # ~$7,400/yr mid-market floor / 12 (checkthat.ai)
      range_max: 5833         # ~$70,000/yr enterprise ceiling / 12 (checkthat.ai)
      source: "https://checkthat.ai/brands/avalara/pricing"
      source_date: 2026-05-11
      confidence: C
    
    annual_price:
      amount: null
      discount_pct_vs_monthly: null
      source: "https://checkthat.ai/brands/avalara/pricing"
      source_date: 2026-05-11
      confidence: C
    
    # Buyer-segment "tiers", these are NOT Avalara's named plans (Avalara
    # has no named plans for AvaTax). They reflect typical contract ranges
    # by buyer revenue size, sourced from aggregator buyer data.
    order_tiers:
      - included_orders: 6000  # ~500/mo * 12, small business floor
        monthly_price: 617
        annual_price: 7400
        api_calls_included: null
        source: "https://checkthat.ai/brands/avalara/pricing"
        confidence: C
      - included_orders: 30000  # ~2,500/mo, typical mid-market
        monthly_price: 1500
        annual_price: 18000
        api_calls_included: null
        source: "https://www.getsphere.com/blog/how-much-does-avalara-cost"
        confidence: D
      - included_orders: 120000  # ~10,000/mo, upper mid-market / lower enterprise
        monthly_price: 3500
        annual_price: 42000
        api_calls_included: null
        source: "https://checkthat.ai/brands/avalara/pricing"
        confidence: C
      - included_orders: null    # Enterprise, fully custom
        monthly_price: null
        annual_price: null
        api_calls_included: null
        source: "https://www.vendr.com/marketplace/avalara"
        confidence: C
    
    overage:
      model: per_unit
      per_unit_cost: null         # Per-transaction overage rate not publicly disclosed
      description: "Per-transaction fees apply when monthly volume exceeds contracted tier. Rate is custom-negotiated and not publicly disclosed. Vendr buyer reports describe overage as a frequent source of unbudgeted cost, customers report being pushed into renegotiation rather than paying overage fees long-term."
    
    included_filings_per_period:
      count: 0                    # AvaTax does NOT include filings; Returns is a separate product
      period: none
    included_integrations: null   # ERP connectors charged separately
    included_states: null
    api_access_included: true     # API is core to AvaTax
    
    features:
      nexus_monitoring: true
      exemption_certificate_mgmt: false  # CertCapture is a separate product
      multi_state_filing: false          # Returns is a separate product
      audit_support: false               # Add-on
      phone_support: true                # Quality varies by tier
      dedicated_csm: true                # Enterprise-tier contracts
      sst_program_access: true           # Avalara is an SST CSP
      vda_support: true                  # Add-on service
      international_vat_gst: true        # Separate product set

  - name: "Avalara Returns (filing and remittance)"
    slug: "returns"
    tagline: "Automated sales tax return preparation, filing, and remittance"
    target_customer: "AvaTax customers with multi-state filing obligations"
    is_free: false
    is_quote_only: true
    
    monthly_price:
      amount: null
      type: range
      range_min: null             # Per-return pricing model, not subscription
      range_max: null
      source: "https://checkthat.ai/brands/avalara/pricing"
      source_date: 2026-05-11
      confidence: C
    
    annual_price:
      amount: null
      discount_pct_vs_monthly: null
      source: ""
      source_date: 2026-05-11
      confidence: G
    
    order_tiers: []               # Priced per-return, not per-order
    
    overage:
      model: per_unit
      per_unit_cost: null
      description: "Returns is typically priced per-filing with a base subscription fee. Per-filing fees publicly reported at $42-$54 per return (checkthat.ai). Combined cost depends on filing frequency and state count."
    
    included_filings_per_period:
      count: null
      period: monthly
    included_integrations: null
    included_states: null
    api_access_included: false
    
    features:
      nexus_monitoring: false
      exemption_certificate_mgmt: false
      multi_state_filing: true
      audit_support: false
      phone_support: true
      dedicated_csm: false
      sst_program_access: true
      vda_support: false
      international_vat_gst: false

  - name: "Avalara 1099 & W-9"
    slug: "1099-w9"
    tagline: "1099 and W-9 management with publicly tiered pricing"
    target_customer: "Any business with 1099 reporting obligations"
    is_free: false
    is_quote_only: false          # Notably, the ONLY Avalara product with published tier pricing
    
    monthly_price:
      amount: null
      type: range
      range_min: null
      range_max: null
      source: "https://checkthat.ai/brands/avalara/pricing"
      source_date: 2026-05-11
      confidence: C
    
    annual_price:
      amount: null
      discount_pct_vs_monthly: null
      source: ""
      source_date: 2026-05-11
      confidence: C
    
    # 1099 product has Individual / Professional / Enterprise tiers
    # publicly priced; need to capture specific dollar amounts from
    # pricing page. Currently null pending direct page snapshot.
    order_tiers: []
    
    overage:
      model: per_unit
      per_unit_cost: null
      description: "Per-1099 pricing within each tier; specifics on pricing page"
    
    included_filings_per_period:
      count: null
      period: annual
    included_integrations: null
    included_states: null
    api_access_included: false
    
    features:
      nexus_monitoring: false
      exemption_certificate_mgmt: false
      multi_state_filing: false
      audit_support: false
      phone_support: true
      dedicated_csm: false
      sst_program_access: false
      vda_support: false
      international_vat_gst: false

# -----------------------------------------------------------------------------
