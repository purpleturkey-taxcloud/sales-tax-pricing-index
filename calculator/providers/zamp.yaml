# Zamp, populated example following schema.yaml v1.0
# Last full verification: 2026-05-12
# Researcher: TaxCloud GTM (initial draft)
#
# DATA POSTURE
# Zamp publishes a Free tier in full detail. The two paid tiers (U.S. Plan and
# Global Plan) are quote-only, no subscription dollar amounts published.
# Range estimates below come from aggregator buyer data and third-party
# comparison pages. Like Avalara, Zamp must be displayed as ranges, never
# as a point estimate.
#
# COMPETITIVE NOTE
# Zamp positions explicitly against per-event pricing models, their landing
# page for Colorado/Alaska home-rule states attacks "per-city charges" as
# unfair. Their value prop is predictable bundle pricing in exchange for a
# higher (custom-quoted) subscription cost.
# =============================================================================

provider:
