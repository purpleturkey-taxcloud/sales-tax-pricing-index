  legal_name: "Zamp, Inc."
  parent_company: null
  hq_location: "United States"
  founded_year: 2022
  primary_url: "https://zamp.com"
  pricing_url: "https://zamp.com/pricing"
  help_center_url: "https://help.zamp.com"
  target_icp: "Mid-market ecommerce and SaaS that want a fully managed (\"done-for-you\") sales tax service instead of self-serve software"
  primary_verticals:
    - ecommerce
    - saas
    - smb
  competitive_position: "Managed sales tax service, Zamp's positioning is 'done-for-you' versus competitors' 'do-it-yourself.' Predictable bundle pricing with no per-transaction fees, no per-filing add-ons. Markets aggressively against Avalara's home-rule per-city billing in Colorado and Alaska. Includes a 'Zamp Commitment' covering customer penalties caused by Zamp calculation or filing errors."

transparency:
  tier: opaque
  rationale: "Free tier fully published. U.S. Plan and Global Plan are quote-only, no subscription, filing, or registration dollar amounts visible on the pricing page. Zamp's stated rationale: 'flat per-state or per-filing pricing often hides risk.'"
  pricing_page_has_dollar_amounts: false  # Only the Free tier is "complimentary"; no dollar amounts on paid plans
  quote_required_for_core_product: true
  publishes_filing_fees: false
  publishes_registration_fees: false
  publishes_overage_rates: false
  publishes_implementation_fees: false

pricing_model:
  primary: custom_quote
  scales_with:
    - revenue
    - transactions
    - states
    - jurisdictions
  predictability_score: 3
  predictability_notes: "Once a quote is signed, Zamp's bundle model is predictable, filings, registrations, notices, and support are included in the subscription with no per-event surcharges. Predictability score is 3 (not higher) because the initial quote opacity makes pre-purchase budgeting difficult, and renewal pricing behavior is undocumented."

