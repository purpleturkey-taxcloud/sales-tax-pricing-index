calculator:
  applicable_inputs:
    - annual_revenue
    - monthlyTransactionVolumeUSD
    - statesFiling
    - requiresInternationalVatGst
  cost_formula_notes: |
    1. If requiresInternationalVatGst: pick Global Plan; else U.S. Plan.
    2. Return a range, never a point estimate (Zamp is opaque per-tier).
    3. Within plan, scale range bounds by buyer segment (revenue + state footprint):
       - startup (<$1M revenue, <5 states): range floor
       - smb ($1M-$10M, 5-15 states): mid-low
       - mid_market ($10M-$50M, 15-30 states): mid-high
       - enterprise ($50M+, 30+ states): range ceiling
    4. Free tier is only returned if the user explicitly indicates they're
       still in the nexus-assessment phase (not modeled in current calculator).
  output_caveat: "Zamp does not publish dollar pricing for the U.S. or Global plans. Ranges are inferred from aggregator buyer commentary and third-party comparison pages. Actual quote will depend on state footprint, transaction volume, integration complexity, and negotiation. Bundle includes filings, registrations, and notice handling at no additional charge."

notes: |
  Zamp is the youngest provider in the tracked set (founded 2022). Their
  go-to-market is explicit: managed service ("done-for-you") at premium
  bundle pricing, attacking per-event pricing models on positioning. The
  Colorado/Alaska home-rule landing page is the clearest expression of this.

  For the /vs/zamp landing pages:
  - vs. Avalara: Zamp's strongest pitch, predictable bundle vs. per-event
    pricing, with the home-rule contrast as the wedge.
  - vs. TaxCloud: ICP overlap (both serve mid-market ecommerce). TaxCloud
    differentiates on SST CSP status (free filings in 24 states for eligible
    customers); Zamp differentiates on done-for-you service model.
  - vs. Numeral / Kintsugi: similar managed-service tier; comparison is
    mostly about price transparency (Numeral publishes Standard, Zamp does
    not publish any paid tier).
  - vs. TaxJar: TaxJar is self-service software at $39+/mo; Zamp is managed
    service starting at ~$199/mo. Different product categories.

  Open research items:
  - Confirm specific entry-tier price for U.S. Plan. $199/mo is reported by
    multiple aggregators but not directly cited by Zamp.
  - Capture mid-market and enterprise pricing ranges from G2 buyer reports
    (full text, requires G2 review access via the G2 MCP).
  - Verify renewal behavior, is the bundle price held flat year-over-year,
    or does it scale with revenue/volume growth?
  - Document specific countries covered on the Global plan.
