change_log:
  - date: 2026-05-14
    change_type: structure_change
    description: "Extended order-tier ladder from 8 tiers (capping at 50K orders/mo) to 17 tiers (capping at 10M orders/mo) on both Starter and Professional, sourced from the TaxJar help center pricing article (updated 2026-05-07). Previously, any customer above 50K monthly orders was being pinned to the 50K tier, a material understatement at upper mid-market and enterprise volumes. The new tiers are 75K, 100K, 250K, 500K, 1M, 2.5M, 5M, 7.5M, 10M. Filing bundle pricing for annual subscribers (e.g., 25/50/100/unlimited filings flat-rate) is published but not yet modeled, calculator continues to use per-filing × volume."
    source: "https://support.taxjar.com/article/139-how-much-does-taxjar-cost"
  - date: 2026-05-12
    change_type: structure_change
    description: "Verified the full order-tier ladder for both Starter and Professional plans against TaxJar's authenticated customer portal. Previously the YAML captured only the entry tier per plan plus Professional 1k from competitor blog data, calculator was therefore using the cheapest tier for any customer above the captured volume (a material underestimate). Eight tiers per plan are now populated with both monthly and annual prices. Source confidence on Professional 1k upgraded D → A. Grandfathering note captured: customers on legacy pricing keep their rates; tier changes re-price to current ladder."
    source: "https://www.taxjar.com/pricing"
  - date: 2026-02-26
    change_type: price_increase
    description: "First price increase in over six years. Starter base plan doubled from $19/mo to $39/mo. AutoFile fees increased from $30-35/return to $50-55/return. Order-volume tier pricing also increased across both Starter and Professional plans."
    source: "https://taxcloud.com/blog/taxjar-pricing-how-much-does-taxjar-cost/"

calculator:
  applicable_inputs:
    - monthly_orders
    - states_filing
    - filing_frequency
    - registration_backlog
  
  cost_formula_notes: |
    1. Determine plan: Starter ($39 base) or Professional ($99 base)
    2. Identify correct order tier based on monthly_orders; select monthly_price for that tier
    3. Apply annual discount (10%) if annual billing
    4. Compute filings_per_year = states_filing * filing_frequency_per_year
    5. Filing cost = max(0, filings_per_year - included_filings) * per_filing_cost
       (per_filing_cost = $50 on Starter, $55 on Professional)
    6. Registration cost = registration_backlog * $299
    7. Total annual = (monthly_price * 12 * annual_discount) + filing_cost + registration_cost
  
  output_caveat: "Estimate assumes no flex fee overage and excludes potential API-call-driven tier inflation on Professional plan."

notes: |
  Critical context for the calculator:
  - TaxJar's Professional plan counts API calls as 1/10 of an order toward the tier. A customer
    with 200 actual orders but 10,000 API calls/month is effectively at 1,200 orders for tier purposes.
    The calculator should add a separate input for API call volume if showing Professional plan.
  - 2026 price increase doubled the entry point; many customers are re-evaluating. Highlight this
    in the comparison landing page (taxcloud.com/vs/taxjar).
  - TaxJar is not SST certified, competitive opening for TaxCloud on multi-state SST footprint.
  - Acquired by Stripe in 2021; support quality degradation is widely reported on Shopify App Store
    (currently 2.9 stars). This is qualitative, not pricing, but is relevant to comparison page.
  - Need to verify full order-tier ladder for both Starter and Professional, captured 200 and 1K so
    far but pricing page slider has 500, 2K, 5K, 10K+ tiers.
