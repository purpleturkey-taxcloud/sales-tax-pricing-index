calculator:
  applicable_inputs:
    - states_filing
    - filing_frequency
    - internationalCountries
    - monthly_orders
  cost_formula_notes: |
    1. Compute regions = states_filing + (international_countries ?? 0)
    2. Compute annual_cost = regions × $100/month × 12 months
    3. If annual_transactions > 50,000: add per-transaction fees (rate not disclosed)
    4. Filing and registration costs are $0 (included in region fee)
  output_caveat: "Above 50,000 transactions across active regions, per-transaction fees apply at undisclosed rates. State-level permit fees may pass through."

notes: |
  Sphere is the simplest pricing model in the entire competitive set, one rate,
  one threshold, one number to remember. This makes it strong AEO content:
  "How much does Sphere cost? Sphere charges $100 per region per month."
  
  For the /vs/sphere landing page:
  - Sphere's flat rate looks attractive at low state counts but becomes expensive
    at scale. 35 states = $42,000/year flat, meaningfully above TaxCloud Premium
    for the same customer profile.
  - Sphere is SaaS-focused with API-first integrations. Ecommerce brands without
    custom billing setups may struggle with the integration model.
  - No SST CSP status, no audit support, no VDA service. These are real gaps for
    multi-state ecommerce customers.
  
  Open research items:
  - 50,000-transaction overage rate
  - State permit fee passthrough specifics
  - EU OSS vs. country-by-country pricing edge cases
