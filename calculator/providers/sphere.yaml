  predictability_notes: "Maximally predictable below the 50,000-transaction threshold: cost = active_regions × $100/month. Above 50,000 transactions, per-transaction fees apply at rates not publicly disclosed. State-level registration fees may pass through. EU counted as one region if filing via OSS."

