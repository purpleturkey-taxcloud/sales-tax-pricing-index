change_log:
  - date: 2026-05-12
    change_type: structure_change
    description: "Verified Anrok pricing against the published pricing sheet (mirrored on G2). Three corrections: Starter ICP is <$2M ARR (we had <$5M), exemption certificates are included in Starter (we had it gated to Core+), and no explicit ARR range is published for Core or Growth (we had inferred $5M-$50M and $50M+)."
    source: "https://www.g2.com/products/anrok/pricing"

calculator:
  applicable_inputs:
    - annual_revenue
    - monthlyTransactionVolumeUSD
  cost_formula_notes: |
    1. Pick plan by annual_revenue:
       - <$2M: Starter ($499/mo + 40 bps), matches Anrok's published Starter ICP
       - $2M-$50M: Core ($999/mo + 30 bps), Anrok does not publish a ceiling here; $50M is our heuristic
       - >$50M: Growth (custom, return quote_required), our heuristic; Anrok publishes no ARR threshold for Growth
    2. Subscription = monthly_price × 12
    3. Transaction fee = annual_taxable_transaction_volume × (bps / 10,000)
    4. Total annual = subscription + transaction_fee
  output_caveat: "Anrok is SaaS-focused. Ecommerce customers should consider providers built for their use case. Transaction fees apply to taxable transactions only, not gross volume, actual cost may be lower than the estimate if a significant share of transactions are non-taxable (e.g., B2B with reseller exemptions)."

notes: |
  Anrok is unusual in the competitive set: hybrid pricing (subscription + bps)
  is rare. The implicit comparison vs. percent-of-revenue pricing is favorable
  (much lower share of revenue), but the explicit comparison vs. flat per-filing
  pricing is unfavorable above ~$5M annual taxable volume.
  
  For the /vs/anrok landing page:
  - Anrok is SaaS-focused; ecommerce comparisons should be framed as ICP
    mismatch rather than direct competitor positioning.
  - Anrok is not an SST CSP. For SaaS businesses, this matters less than for
    ecommerce because most SaaS isn't taxable in SST states, but it matters
    for states where SaaS is taxable.
  - Hybrid pricing penalizes growth. A SaaS at $10M ARR scaling to $50M ARR
    sees their Anrok bill grow ~5x if transaction volume scales proportionally,
    even staying on the same plan tier.
  
  Open research items:
  - Growth plan structure: is it fully custom or is there a published rate floor?
  - Specific VDA and backfile pricing
  - International country list and any per-country surcharges
