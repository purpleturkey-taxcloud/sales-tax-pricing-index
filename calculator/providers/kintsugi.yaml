calculator:
  applicable_inputs:
    - states_filing
    - filing_frequency
    - registration_backlog
    - integration_type  # API/ERP customers pushed to Premium
    - annual_revenue  # For Premium estimation
  
  cost_formula_notes: |
    For Free plan: Total cost = 0
    
    For Starter plan:
    1. Filings per year = states_filing * filing_frequency_per_year
    2. Filing cost = filings_per_year * $75
    3. Registration cost = registration_backlog * $75
    4. Total annual = filing_cost + registration_cost
    
    For Premium: Cannot compute to point estimate.
    Display range: Starter pricing baseline + uplift for Premium features.
    Galvix historically reported $500/month covering up to 7 states but this is not
    on the current pricing page. Show as 'Custom, contact for quote'.
  
  output_caveat: "Starter plan pricing is exact per Kintsugi's published pricing page. Premium plan requires a custom quote; pricing structure is flat-rate with volume discount per Kintsugi's feature matrix."

notes: |
  Competitive intelligence for /vs/kintsugi landing page:
  
  - Kintsugi and Numeral charge identical $75/filing on entry tier, emerging convergence
    point in the modern sales tax pricing landscape. The differentiation moves to feature
    gating (what's in Starter vs. Premium) and integration depth.
  - Kintsugi includes exemption certificate management in Starter; Numeral pushes ECM
    to Pro. This is a Kintsugi advantage at the entry tier.
  - Kintsugi registration is $75 vs. Numeral $150, meaningful difference for businesses
    with high registration backlog (e.g., a brand registering in 30+ states). For a 30-state
    backfile, Kintsugi is $2,250 vs. Numeral $4,500.
  - Kintsugi is NOT SST certified. Same SST narrative as Numeral applies, multi-state
    SST footprint is a major cost advantage for TaxCloud customers.
  - Vertex's 10% strategic stake is competitive context worth surfacing. It suggests a
    potential acquisition path or deep partnership that could change Kintsugi's product
    posture over time. Customers evaluating multi-year compliance commitments may want
    to know.
  - 'No annual commitments. Ever.' on the pricing page is a customer-friendly stance;
    TaxCloud's annual prepay discount may need to be reframed as a customer benefit
    rather than a commitment requirement.
  - AI-native positioning is the main marketing wedge. Counter with: TaxCloud has been
    operating tax compliance for 15+ years at scale; AI features without operational
    depth and SST certification create risk for businesses that get audited.
  
  Schema observations from this provider:
  - The "feature-matrix transparency" pattern, published tier names + detailed feature
    comparison + Premium-as-custom, is captured cleanly with the existing schema.
  - The Galvix-reported $500/mo Premium price is in `range_min` with confidence D so
    the calculator can choose to display it or not based on user preference.
  - The 'no implementation fee' is captured with amount=0 and confidence A, which is
    a positive transparency signal worth highlighting on the comparison page.
  
  Open research questions:
  - Whether the $500/mo Premium tier is still current, Galvix's article is from
    2 weeks ago (Mar 2026) but the price isn't on the current pricing page. Direct
    outreach to Kintsugi sales would clarify.
  - Specific Premium volume discount thresholds
  - Error insurance coverage limits
  - International filing pricing structure under Premium
  - Whether Premium has dedicated CSM or is self-serve with chat support
