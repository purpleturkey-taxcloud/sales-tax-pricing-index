calculator:
  applicable_inputs:
    - states_filing
    - filing_frequency
    - registration_backlog
    - annual_revenue  # For Pro tier estimation only
    - integration_type  # ERP integration pushes to Pro
  
  cost_formula_notes: |
    For Free plan: Total cost = 0
    
    For Standard plan:
    1. Filings per year = states_filing * filing_frequency_per_year
    2. Filing cost = filings_per_year * $75
    3. Registration cost = registration_backlog * $150
    4. Total annual = filing_cost + registration_cost
    
    For Pro plan: Cannot compute to point estimate.
    Display range: Standard pricing + uplift for Pro features.
    Reports suggest Pro adds fixed fee + potential % of revenue for ERP-integrated customers.
  
  output_caveat: "Standard plan pricing is exact per Numeral's published pricing page. Pro plan requires a custom quote and may include revenue-based components for non-standard integrations."

notes: |
  Competitive intelligence for /vs/numeral landing page:
  
  - The Per-State Compounding Effect is the headline. At $75/filing, a business filing monthly
    in 15 states pays $1,125/month in filing fees alone. TaxCloud's SST coverage in 24 states
    eliminates filing cost for eligible customers, this is the most important narrative on
    the comparison page.
  - Numeral is NOT SST certified. Full $75/return applies in all SST states. Galvix calculates
    that a business filing monthly in 10 SST states pays $750/month that a certified provider
    would eliminate entirely.
  - Per-event pricing is simple at low volume; it becomes a tax on scaling. The /vs/numeral
    page should show a side-by-side cost curve: TaxCloud's order-volume + low filing fee
    structure beats Numeral on multi-state, high-filing-frequency profiles.
  - Pro plan opacity is a vulnerability. Customers reviewing alternatives don't know what
    they'll pay if they need exemption certs, API access, or VDAs. Lean into TaxCloud's
    transparent inclusion of ECM and API on Premium.
  - Customer support quality is mixed per G2 and Shopify App Store. Some 1-star reviews
    cite late filings and slow response times. Counter with TaxCloud U.S.-based support
    and 2-hour SLA.
  
  Schema observations from this provider:
  - Pure per-event pricing handled fine by setting monthly_price to 0 and using
    filings.base_cost and registrations.base_cost as the primary cost drivers.
  - Free tier (not trial) is captured cleanly with is_free=true and zero pricing.
  - "Pro plan opacity within a partially transparent provider" is captured via the
    is_quote_only=true flag on a specific plan rather than the whole provider.
  
  Open research questions:
  - Specific Pro plan pricing structure: confirm whether it's fixed fee, % of revenue,
    or hybrid. Reach out to former Numeral Pro customers via Sybill transcripts or
    LinkedIn DMs.
  - Exemption certificate management pricing for 50+ certificates
  - Whether international VAT/GST has per-country filing fees on top of the Pro base
  - SLA terms, Galvix mentions Pro plan has SLA agreements but specifics not public
